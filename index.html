<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASREMOBL | Premium Furniture Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .slider-btn { background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease; }
        .slider-btn:hover { background: rgba(255,255,255,1); transform: scale(1.05); }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-slate-900 antialiased flex flex-col min-h-screen selection:bg-slate-200">

    <header class="sticky top-0 z-50 glass-panel border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-xl font-semibold tracking-widest text-slate-900">KASREMOBL</div>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-medium text-slate-500">
                <a href="#" class="hover:text-slate-900 transition">Koleksiyonlar</a>
                <a href="#" class="hover:text-slate-900 transition">Hakkımızda</a>
                <a href="#" class="hover:text-slate-900 transition">İletişim</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16 flex-grow">
        <div class="mb-14">
            <h1 class="text-4xl font-light tracking-tight text-slate-900">Minimalist Yaşam Alanları</h1>
            <p class="text-slate-500 mt-3 text-sm font-medium">Doğal dokular, zamansız çizgiler.</p>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 text-slate-400 text-sm animate-pulse">Koleksiyon yükleniyor...</div>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-200 bg-white py-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center justify-center space-y-3">
            <p class="text-[10px] text-slate-400 tracking-[0.2em] uppercase font-semibold">© 2026 KASRMOBILYA. ALL RIGHTS RESERVED.</p>
            <p class="text-xs text-slate-500 font-medium">Hadi Bakhtzadeh | AIOS Architect | Building smart multi-agent systems and AI solution</p>
        </div>
    </footer>

    <script>
        // کلیدهای پایگاه داده (ذخیره این مقادیر در فرانت‌اند کاملا امن و استاندارد است)
        const SUPABASE_URL = "https://ooklzhsnzovfnmzdupoq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9va2x6aHNuem92Zm5temR1cG9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MDcwODEsImV4cCI6MjA5ODQ4MzA4MX0.YPRQUSUmC0_D7AhIYlh-SxAuZ4817Q6rywtr5gImnTs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchProducts() {
            const { data: products, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            renderProducts(products);
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            if (!products || products.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 text-sm">Henüz ürün eklenmedi.</div>`;
                return;
            }
            grid.innerHTML = '';

            products.forEach((product) => {
                const images = product.image_urls || [];
                const mainImage = images.length > 0 ? images[0] : 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?q=80&w=800';
                const hasMultiple = images.length > 1;
                const imagesJson = JSON.stringify(images).replace(/"/g, '&quot;');
                
                const descParts = product.name_or_desc ? product.name_or_desc.split('\n\n') : ['İsimsiz', ''];
                const title = descParts[0];
                const bio = descParts.slice(1).join('<br/>');

                let featuresHtml = '';
                if (product.features && product.features.length > 0) {
                    product.features.forEach(f => {
                        featuresHtml += `<span class="inline-block bg-slate-100 text-slate-600 text-[10px] font-semibold px-2.5 py-1 rounded-md border border-slate-200 uppercase tracking-wide">${f}</span>`;
                    });
                }

                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col justify-between";
                
                let sliderControls = '';
                if(hasMultiple) {
                    sliderControls = `
                        <button onclick="changeSlide('${product.id}', -1, ${imagesJson})" class="slider-btn absolute left-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full flex items-center justify-center text-slate-800 shadow-md z-10 text-sm">❮</button>
                        <button onclick="changeSlide('${product.id}', 1, ${imagesJson})" class="slider-btn absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full flex items-center justify-center text-slate-800 shadow-md z-10 text-sm">❯</button>
                        <div class="absolute bottom-3 left-1/2 -translate-y-1/2 px-3 py-1 bg-black/60 text-white text-[10px] font-medium rounded-full backdrop-blur-md z-10 tracking-widest"><span id="slide-count-${product.id}">1</span> / ${images.length}</div>
                    `;
                }

                card.innerHTML = `
                    <div>
                        <div class="aspect-[4/3] bg-slate-50 relative overflow-hidden group">
                            <img id="img-${product.id}" src="${mainImage}" class="w-full h-full object-cover transition duration-700 group-hover:scale-105" alt="${title}" data-index="0">
                            <span class="absolute top-4 right-4 bg-white/95 backdrop-blur-md text-[10px] font-bold px-3 py-1.5 rounded-full shadow-sm text-slate-800 z-10 tracking-wider uppercase">${product.status === 'Mevcut' ? 'Stokta Var' : 'Tükendi'}</span>
                            ${sliderControls}
                        </div>
                        <div class="p-7">
                            <span class="text-[10px] font-bold tracking-[0.15em] text-slate-400 uppercase">${product.category}</span>
                            <h3 class="text-xl font-semibold text-slate-900 mt-2">${title}</h3>
                            <div class="flex flex-wrap gap-2 mt-4">${featuresHtml}</div>
                            <div class="mt-6 pt-5 border-t border-slate-100 flex items-center justify-between">
                                <span class="text-lg font-bold text-slate-900">${product.price}</span>
                                <button onclick="toggleDetails('${product.id}')" class="text-xs font-semibold text-slate-700 border border-slate-300 px-5 py-2.5 rounded-lg hover:bg-slate-900 hover:text-white transition-colors duration-300">İncele</button>
                            </div>
                            <div id="details-${product.id}" class="hidden mt-5 p-5 bg-slate-50 rounded-xl text-sm text-slate-600 leading-relaxed border border-slate-100">
                                ${bio || 'Bu ürün için ek açıklama bulunmamaktadır.'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 p-5 border-t border-slate-100">
                        <div class="text-[11px] font-semibold text-slate-500 mb-3 flex items-center gap-2 uppercase tracking-wide">
                            <span class="relative flex h-2.5 w-2.5">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                            </span>
                            AI Satış Danışmanı
                        </div>
                        <div id="chat-box-${product.id}" class="max-h-48 overflow-y-auto space-y-3 mb-4 text-sm hidden scroll-smooth"></div>
                        <div class="flex gap-2">
                            <input id="input-${product.id}" type="text" placeholder="Ürün hakkında detay sorun..." class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-sm transition focus:outline-none focus:border-slate-500 focus:ring-1 focus:ring-slate-500 shadow-sm" onkeypress="if(event.key === 'Enter') sendMessage('${product.id}', '${title}', '${product.price}')">
                            <button id="btn-${product.id}" onclick="sendMessage('${product.id}', '${title}', '${product.price}')" class="bg-slate-900 text-white px-5 py-3 rounded-xl text-sm font-medium hover:bg-slate-800 transition-colors shadow-sm">Sor</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.changeSlide = function(productId, direction, images) {
            const imgEl = document.getElementById(`img-${productId}`);
            const countEl = document.getElementById(`slide-count-${productId}`);
            let currentIndex = parseInt(imgEl.getAttribute('data-index'));
            currentIndex += direction;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            imgEl.src = images[currentIndex];
            imgEl.setAttribute('data-index', currentIndex);
            if(countEl) countEl.innerText = currentIndex + 1;
        };

        window.toggleDetails = function(productId) {
            const detailsDiv = document.getElementById(`details-${productId}`);
            detailsDiv.classList.toggle('hidden');
        };

        // ارسال پیام به سرور امن خودمان در ورسل (بدون نمایش کلید جمینای)
        window.sendMessage = async function(productId, productTitle, productPrice) {
            const input = document.getElementById(`input-${productId}`);
            const button = document.getElementById(`btn-${productId}`);
            const chatBox = document.getElementById(`chat-box-${productId}`);
            const text = input.value.trim();
            if(!text) return;

            chatBox.classList.remove('hidden');
            chatBox.innerHTML += `<div class="text-right text-slate-800 bg-slate-200/60 p-3 rounded-2xl rounded-tr-sm ml-12 mb-2 shadow-sm">${text}</div>`;
            input.value = '';
            input.disabled = true;
            button.disabled = true;

            const loadingId = 'load-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="text-left text-slate-400 text-xs p-2 animate-pulse flex items-center gap-2">Danışman yazıyor<span class="flex gap-0.5"><span class="h-1 w-1 bg-slate-400 rounded-full animate-bounce"></span><span class="h-1 w-1 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></span><span class="h-1 w-1 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span></span></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const systemPrompt = `Sen KASREMOBL (Kasr Mobilya) adlı lüks ve premium mobilya markasının elit satış yöneticisisin. Müşteri şu anda "${productTitle}" (Fiyat: ${productPrice}) ürününü inceliyor. Müşteriye çok kibar, profesyonel ve kısa (maksimum 2-3 cümle) cevaplar ver. Asla başka marka önerme. Amacın müşteriye değer hissettirmek ve showroom'a davet etmek. Dil: Türkçe.`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, systemPrompt })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                if (response.ok && data.candidates && data.candidates.length > 0) {
                    let aiText = data.candidates[0].content.parts[0].text;
                    aiText = aiText.replace(/\*\*(.*?)\*\*/g, '<strong class="text-slate-900 font-semibold">$1</strong>'); 
                    chatBox.innerHTML += `<div class="text-left text-slate-700 bg-white border border-slate-100 p-4 rounded-2xl rounded-tl-sm mr-12 shadow-sm mb-2 leading-relaxed">${aiText}</div>`;
                } else {
                    console.error("API Error:", data.error);
                    chatBox.innerHTML += `<div class="text-left text-red-600 text-xs p-3 border border-red-100 bg-red-50 rounded-lg">Hata: ${data.error || 'Bağlantı sorunu'}</div>`;
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="text-left text-red-600 text-xs p-3">Sistem şu an meşgul.</div>`;
            }

            input.disabled = false;
            button.disabled = false;
            input.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        fetchProducts();
    </script>
</body>
</html>
