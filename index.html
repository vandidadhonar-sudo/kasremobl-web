<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASREMOBL | Premium Furniture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .slider-btn { background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); transition: all 0.2s; }
        .slider-btn:hover { background: rgba(255,255,255,1); }
    </style>
</head>
<body class="text-slate-900 antialiased flex flex-col min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-xl font-semibold tracking-widest text-slate-900">KASREMOBL</div>
            <nav class="hidden md:flex items-center space-x-8 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-slate-900 transition">Koleksiyonlar</a>
                <a href="#" class="hover:text-slate-900 transition">Hakkımızda</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 flex-grow">
        <div class="mb-12">
            <h1 class="text-3xl font-light tracking-tight text-slate-900">Minimalist Yaşam Alanları</h1>
            <p class="text-slate-500 mt-2 text-sm">Doğal dokular, zamansız çizgiler.</p>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-12 text-slate-400 text-sm">Ürünler yükleniyor...</div>
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-100 bg-white py-8">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-[10px] text-slate-400 tracking-wider uppercase mb-2">© 2026 KASRMOBILYA. ALL RIGHTS RESERVED.</p>
            <p class="text-xs text-slate-500 font-medium">Hadi Bakhtzadeh | AIOS Architect | Building smart multi-agent systems and AI solutions</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = "https://ooklzhsnzovfnmzdupoq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9va2x6aHNuem92Zm5temR1cG9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MDcwODEsImV4cCI6MjA5ODQ4MzA4MX0.YPRQUSUmC0_D7AhIYlh-SxAuZ4817Q6rywtr5gImnTs";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchProducts() {
            const { data: products, error } = await _supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            renderProducts(products);
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            if (!products || products.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm">Henüz ürün eklenmedi.</div>`;
                return;
            }
            grid.innerHTML = '';

            products.forEach((product, index) => {
                const images = product.image_urls || [];
                const mainImage = images.length > 0 ? images[0] : 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?q=80&w=800';
                const hasMultiple = images.length > 1;
                const imagesJson = JSON.stringify(images).replace(/"/g, '&quot;');
                
                const descParts = product.name_or_desc ? product.name_or_desc.split('\n\n') : ['İsimsiz', ''];
                const title = descParts[0];
                const bio = descParts.slice(1).join('<br/>');

                let featuresHtml = '';
                if (product.features && product.features.length > 0) {
                    product.features.forEach(f => {
                        featuresHtml += `<span class="inline-block bg-slate-50 text-slate-600 text-[10px] font-medium px-2 py-1 rounded border border-slate-100">${f}</span>`;
                    });
                }

                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 rounded-xl overflow-hidden shadow-sm flex flex-col justify-between hover:shadow-md transition duration-300";
                
                let sliderControls = '';
                if(hasMultiple) {
                    sliderControls = `
                        <button onclick="changeSlide('${product.id}', -1, ${imagesJson})" class="slider-btn absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center text-slate-700 shadow-sm z-10">❮</button>
                        <button onclick="changeSlide('${product.id}', 1, ${imagesJson})" class="slider-btn absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center text-slate-700 shadow-sm z-10">❯</button>
                        <div class="absolute bottom-2 left-1/2 -translate-y-1/2 px-2 py-0.5 bg-black/50 text-white text-[10px] rounded-full backdrop-blur-sm z-10"><span id="slide-count-${product.id}">1</span>/${images.length}</div>
                    `;
                }

                card.innerHTML = `
                    <div>
                        <div class="aspect-[4/3] bg-slate-50 relative overflow-hidden group">
                            <img id="img-${product.id}" src="${mainImage}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105" alt="${title}" data-index="0">
                            <span class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm text-[11px] font-medium px-2.5 py-1 rounded-full shadow-sm text-slate-900 z-10">${product.status === 'Mevcut' ? 'Stokta Var' : 'Tükendi'}</span>
                            ${sliderControls}
                        </div>
                        <div class="p-6">
                            <span class="text-[11px] font-semibold tracking-wider text-slate-400 uppercase">${product.category}</span>
                            <h3 class="text-lg font-medium text-slate-900 mt-1">${title}</h3>
                            
                            <div class="flex flex-wrap gap-1.5 mt-3">${featuresHtml}</div>
                            
                            <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between">
                                <span class="text-sm font-semibold text-emerald-700">${product.price}</span>
                                <button onclick="toggleDetails('${product.id}')" class="text-xs font-medium text-slate-900 border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-50 transition">Detayları İncele</button>
                            </div>
                            
                            <div id="details-${product.id}" class="hidden mt-4 p-4 bg-slate-50 rounded-lg text-xs text-slate-600 leading-relaxed border border-slate-100">
                                ${bio || 'Bu ürün için ek açıklama bulunmamaktadır.'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-slate-50/50 p-4 border-t border-slate-100">
                        <div class="text-[11px] font-medium text-slate-400 mb-2 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
                            AI Satış Danışmanı (Bağlanıyor...)
                        </div>
                        <div id="chat-box-${product.id}" class="max-h-32 overflow-y-auto space-y-2 mb-3 text-xs hidden"></div>
                        <div class="flex gap-2">
                            <input id="input-${product.id}" type="text" placeholder="API Bekleniyor..." class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs opacity-60 cursor-not-allowed" disabled>
                            <button class="bg-slate-300 text-slate-500 px-3 py-2 rounded-lg text-xs cursor-not-allowed" disabled>Sor</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // منطق اسلایدر تصاویر
        window.changeSlide = function(productId, direction, images) {
            const imgEl = document.getElementById(`img-${productId}`);
            const countEl = document.getElementById(`slide-count-${productId}`);
            let currentIndex = parseInt(imgEl.getAttribute('data-index'));
            
            currentIndex += direction;
            if (currentIndex >= images.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = images.length - 1;
            
            imgEl.src = images[currentIndex];
            imgEl.setAttribute('data-index', currentIndex);
            if(countEl) countEl.innerText = currentIndex + 1;
        };

        // منطق باز و بسته شدن توضیحات
        window.toggleDetails = function(productId) {
            const detailsEl = document.getElementById(`details-${productId}`);
            detailsEl.classList.toggle('hidden');
        };

        fetchProducts();
    </script>
</body>
</html>
